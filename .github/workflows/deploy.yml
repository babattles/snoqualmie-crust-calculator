name: Build and deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml,Caddyfile"
          target: "/tmp/"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          SNOWOBS_BASE_URL: ${{ secrets.SNOWOBS_BASE_URL }}
          SNOWOBS_TOKEN: ${{ secrets.SNOWOBS_TOKEN }}
          SNOWOBS_SOURCE: ${{ secrets.SNOWOBS_SOURCE }}
          API_KEY: ${{ secrets.API_KEY }}
          IMAGE: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          GHCR_USER: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: SNOWOBS_BASE_URL,SNOWOBS_TOKEN,SNOWOBS_SOURCE,API_KEY,IMAGE,GHCR_USER,GHCR_TOKEN
          script: |
            set -euo pipefail
            if ! command -v docker >/dev/null 2>&1; then
              curl -fsSL https://get.docker.com | sudo sh
              sudo systemctl enable --now docker
            fi
            sudo mkdir -p ${{ secrets.EC2_APP_DIR }}
            sudo rm -rf ${{ secrets.EC2_APP_DIR }}/docker-compose.yml ${{ secrets.EC2_APP_DIR }}/Caddyfile
            sudo mv /tmp/docker-compose.yml ${{ secrets.EC2_APP_DIR }}/docker-compose.yml
            sudo mv /tmp/Caddyfile ${{ secrets.EC2_APP_DIR }}/Caddyfile
            cd ${{ secrets.EC2_APP_DIR }}
            umask 077
            sudo tee .env > /dev/null <<EOF
            SNOWOBS_BASE_URL=$SNOWOBS_BASE_URL
            SNOWOBS_TOKEN=$SNOWOBS_TOKEN
            SNOWOBS_SOURCE=$SNOWOBS_SOURCE
            API_KEY=$API_KEY
            IMAGE=$IMAGE
            EOF
            sudo chmod 600 .env
            echo "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USER" --password-stdin
            sudo docker compose pull
            sudo docker compose up -d
            sudo docker logout ghcr.io
            sudo docker image prune -f
